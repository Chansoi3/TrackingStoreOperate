<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Store Operation Monitor</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root { var(--bg-color): #f0f2f5; }
    body { background-color: var(--bg-color); font-family: 'Prompt', sans-serif; }
    
    .app-header {
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      color: white; padding: 25px 0 45px 0; border-radius: 0 0 25px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .filter-card {
      border-radius: 16px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      margin-top: -30px; position: relative; z-index: 10; background: white;
    }
    
    .store-card {
      border-radius: 16px; border: 1px solid #e2e8f0; 
      box-shadow: 0 6px 15px rgba(0,0,0,0.06); transition: all 0.2s ease; 
      margin-bottom: 20px; position: relative;
    }
    .store-card:active { transform: scale(0.98); }
    
    .store-card:nth-child(odd) { background-color: #ffffff; border-left: 6px solid #2c5364; }          
    .store-card:nth-child(even) { background-color: #f4f9ff; border-left: 6px solid #6ab0e6; }         
    
    .store-title { font-size: 1.05rem; line-height: 1.3; margin-bottom: 0px; }
    .time-box { background-color: rgba(255, 255, 255, 0.6); border-radius: 12px; padding: 10px; border: 1px solid #e9ecef;}
    .time-text { font-size: 1.15rem; letter-spacing: -0.5px; margin-top: 2px; margin-bottom: 4px; }
    
    .status-badge { font-size: 0.75rem; padding: 5px 0; border-radius: 8px; width: 100%; display: block; }
    .form-select, .btn { border-radius: 10px; font-size: 0.9rem; }
    
    /* ปรับแต่งปุ่ม Filter เสริม */
    .btn-group .btn { font-size: 0.85rem; padding: 8px 0; font-weight: 600;}
  </style>
</head>
<body>

  <div class="app-header text-center">
    <h4 class="fw-bold mb-1"><i class="bi bi-shop-window"></i> ระบบเช็คเวลาเปิด-ปิดร้าน</h4>
  </div>

  <div class="container px-3">
    <div class="card filter-card p-3 mb-3 mx-auto">
      <div class="row g-2 align-items-end">
        <div class="col-12">
          <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;"><i class="bi bi-calendar-event"></i> เลือกวันที่ (DD/MM/YYYY)</label>
          <select id="dateSelect" class="form-select">
            <option value="">-- โหลดข้อมูล... --</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส DD</label>
          <select id="distSelect" class="form-select" onchange="updateFilters()">
            <option value="">-- โหลด... --</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส AM</label>
          <select id="areaSelect" class="form-select" onchange="updateFilters()">
            <option value="">-- ทั้งหมด --</option>
          </select>
        </div>
        <div class="col-12 mt-2">
          <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;"><i class="bi bi-shop"></i> รหัส/ชื่อสาขา</label>
          <select id="storeSelect" class="form-select">
            <option value="">-- สาขาทั้งหมด --</option>
          </select>
        </div>
        <div class="col-12 mt-3">
          <button class="btn btn-primary w-100 fw-bold py-2 shadow-sm" onclick="fetchData()">
            <i class="bi bi-search"></i> ค้นหาข้อมูล
          </button>
        </div>
      </div>
    </div>

    <div class="row px-1 mb-4" id="statusFilterContainer" style="display: none;">
      <div class="col-12">
        <div class="btn-group w-100 shadow-sm" role="group">
          <input type="radio" class="btn-check" name="statusFilter" id="filterAll" value="All" autocomplete="off" checked onchange="applyStatusFilter()">
          <label class="btn btn-outline-primary" for="filterAll">ทั้งหมด</label>

          <input type="radio" class="btn-check" name="statusFilter" id="filterLateOpen" value="LateOpen" autocomplete="off" onchange="applyStatusFilter()">
          <label class="btn btn-outline-danger" for="filterLateOpen">เปิดสาย</label>

          <input type="radio" class="btn-check" name="statusFilter" id="filterLateClose" value="LateClose" autocomplete="off" onchange="applyStatusFilter()">
          <label class="btn btn-outline-warning" for="filterLateClose">ปิดช้า</label>
        </div>
      </div>
    </div>

    <div id="loading" class="text-center my-5" style="display:none;">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted fw-bold">กำลังดึงข้อมูล...</p>
    </div>

    <div id="cardContainer" class="pb-4"></div>
  </div>

  <script>
    // ⚠️ อย่าลืมเช็ค URL ของ Web App ให้ตรงกับของคุณนะครับ
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNv8_4WfAFO5B3wcfxBWTNgHKhjSQid3r4jZfCVT2RKqAcVCDN_71neLwIg8opDxjB/exec";
    
    let areaDataMapping = {};
    let allStoresData = []; 
    let currentFetchedData = []; // เพิ่มตัวแปรเก็บข้อมูลดิบที่ดึงมา เพื่อใช้ทำ Filter ในหน้าเว็บ

    window.onload = function() {
      fetch(APPS_SCRIPT_URL + "?action=getDropdown")
        .then(res => res.json())
        .then(data => populateDropdowns(data))
        .catch(err => console.error(err));
    };

    function populateDropdowns(data) {
      areaDataMapping = data.mapping;
      allStoresData = data.stores; 
      
      let dateSelect = document.getElementById('dateSelect');
      dateSelect.innerHTML = '<option value="">-- ทุกวันที่ --</option>'; 
      data.dates.forEach(d => dateSelect.add(new Option(d.text, d.value)));
      if(data.dates.length > 0) dateSelect.value = data.dates[0].value; 

      let distSelect = document.getElementById('distSelect');
      distSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>'; 
      data.dists.forEach(dist => distSelect.add(new Option(dist, dist)));
      
      updateFilters(); 
      fetchData(); 
    }

    function updateFilters() {
      let distVal = document.getElementById('distSelect').value;
      
      let areaSelect = document.getElementById('areaSelect');
      let currentArea = areaSelect.value;
      areaSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>';
      if (distVal && areaDataMapping[distVal]) {
        areaDataMapping[distVal].forEach(area => {
          let opt = new Option(area, area);
          if(area === currentArea) opt.selected = true;
          areaSelect.add(opt);
        });
      }
      
      let updatedArea = areaSelect.value;

      let storeSelect = document.getElementById('storeSelect');
      let currentStore = storeSelect.value;
      storeSelect.innerHTML = '<option value="">-- สาขาทั้งหมด --</option>';
      
      let filteredStores = allStoresData.filter(s => {
         let matchDist = distVal ? s.dist === distVal : true;
         let matchArea = updatedArea ? s.area === updatedArea : true;
         return matchDist && matchArea;
      });

      filteredStores.forEach(s => {
         let text = `${s.code} ${s.name}`; 
         let opt = new Option(text, s.code);
         if(s.code === currentStore) opt.selected = true;
         storeSelect.add(opt);
      });
    }

    function fetchData() {
      let dist = document.getElementById('distSelect').value;
      let area = document.getElementById('areaSelect').value;
      let date = document.getElementById('dateSelect').value;
      let store = document.getElementById('storeSelect').value; 
      
      document.getElementById('loading').style.display = 'block';
      document.getElementById('cardContainer').innerHTML = '';
      document.getElementById('statusFilterContainer').style.display = 'none'; // ซ่อนปุ่ม Filter ตอนกำลังโหลด

      let url = `${APPS_SCRIPT_URL}?action=getTableData&dist=${encodeURIComponent(dist)}&area=${encodeURIComponent(area)}&date=${encodeURIComponent(date)}&store=${encodeURIComponent(store)}`;

      fetch(url)
        .then(res => res.json())
        .then(data => {
          currentFetchedData = data; // เก็บข้อมูลทั้งหมดไว้ในตัวแปร
          document.getElementById('statusFilterContainer').style.display = 'block'; // แสดงปุ่ม Filter เมื่อโหลดเสร็จ
          applyStatusFilter(); // เรียกใช้การกรองข้อมูลปัจจุบัน
        })
        .catch(err => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('cardContainer').innerHTML = '<div class="alert alert-danger text-center">ไม่สามารถเชื่อมต่อได้</div>';
        });
    }

    // ฟังก์ชันใหม่ สำหรับกรองข้อมูลแบบ Real-time บนหน้าเว็บ
    function applyStatusFilter() {
      let filterType = document.querySelector('input[name="statusFilter"]:checked').value;
      let filteredData = currentFetchedData;

      if (filterType === 'LateOpen') {
        // กรองเฉพาะสาขาที่ เปิดร้านสาย (monitorOpen คือ 'Red')
        filteredData = currentFetchedData.filter(row => row[7] === 'Red');
      } 
      else if (filterType === 'LateClose') {
        // กรองเฉพาะสาขาที่ ปิดร้านช้า (monitorClose คือ 'Red')
        // *หมายเหตุ: ถ้าสถานะปิดช้าของคุณคือสีอื่น เช่น 'Yellow' ให้แก้ตรงนี้ได้เลยครับ
        filteredData = currentFetchedData.filter(row => row[8] === 'Red');
      }

      renderCards(filteredData);
    }

    function renderCards(data) {
      document.getElementById('loading').style.display = 'none';
      let container = document.getElementById('cardContainer');
      
      if(data.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-inbox d-block fs-1"></i>ไม่พบข้อมูลในระบบ หรือไม่พบสาขาในสถานะนี้</div>';
        return;
      }

      let html = '';
      data.forEach(row => {
        let timeInStr = row[5] ? row[5].substring(0, 5) : '-';
        let timeOutStr = row[6] ? row[6].substring(0, 5) : '-';

        html += `
        <div class="store-card card p-3">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="store-title fw-bold text-primary">${row[2]} ${row[3]}</h6>
            <span class="badge bg-secondary opacity-75"><i class="bi bi-calendar3"></i> ${row[4]}</span>
          </div>
          
          <div class="row g-2 text-center mt-1">
            <div class="col-6">
              <div class="time-box">
                <small class="text-muted d-block fw-bold" style="font-size: 0.75rem;">เวลาเข้าร้าน</small>
                <div class="fw-bold time-text text-dark">${timeInStr} น.</div>
                ${getBadge(row[7])}
              </div>
            </div>
            <div class="col-6">
              <div class="time-box">
                <small class="text-muted d-block fw-bold" style="font-size: 0.75rem;">เวลาออกร้าน</small>
                <div class="fw-bold time-text text-dark">${timeOutStr} น.</div>
                ${getBadge(row[8])}
              </div>
            </div>
          </div>
        </div>
        `;
      });
      container.innerHTML = html;
    }

    function getBadge(status) {
      if(status === 'Red') return `<span class="badge bg-danger status-badge shadow-sm"><i class="bi bi-x-circle"></i> สาย (Red)</span>`;
      if(status === 'Yellow') return `<span class="badge bg-warning text-dark status-badge shadow-sm"><i class="bi bi-exclamation-circle"></i> เสี่ยง (Yellow)</span>`;
      if(status === 'Green') return `<span class="badge bg-success status-badge shadow-sm"><i class="bi bi-check-circle"></i> ปกติ (Green)</span>`;
      return `<span class="badge bg-secondary status-badge opacity-50">-</span>`;
    }
  </script>
</body>
</html>
