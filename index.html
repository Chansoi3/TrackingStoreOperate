<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตรวจสอบเวลาเปิด-ปิดสาขา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .status-badge { width: 80px; padding: 8px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h3 class="mb-4 text-primary text-center">⏱️ ระบบตรวจสอบเวลาเปิด-ปิดสาขา</h3>
    
    <div class="card p-3 mb-4 shadow-sm">
      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label class="form-label fw-bold">เลือก DistCode (DD)</label>
          <select id="distSelect" class="form-select" onchange="updateAreaDropdown()">
            <option value="">-- โหลดข้อมูล... --</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label fw-bold">เลือก AreaCode (AM)</label>
          <select id="areaSelect" class="form-select">
            <option value="">-- ทั้งหมด (แสดงทุก AM) --</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100 fw-bold" onclick="fetchData()">ค้นหาข้อมูล</button>
        </div>
      </div>
    </div>

    <div id="loading" class="text-center my-4" style="display:none;">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">กำลังโหลดข้อมูล...</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>DD</th>
              <th>AM</th>
              <th>รหัสสาขา</th>
              <th>ชื่อสาขา</th>
              <th>วันที่</th>
              <th>เวลาทำการ</th>
              <th class="text-center">สถานะเปิดร้าน</th>
              <th class="text-center">สถานะปิดร้าน</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // URL ของ Google Apps Script ที่คุณให้มา
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNv8_4WfAFO5B3wcfxBWTNgHKhjSQid3r4jZfCVT2RKqAcVCDN_71neLwIg8opDxjB/exec";
    
    let areaDataMapping = {};

    // 1. โหลดข้อมูล Dropdown ทันทีเมื่อเปิดเว็บ
    window.onload = function() {
      document.getElementById('distSelect').innerHTML = '<option value="">-- กำลังเชื่อมต่อฐานข้อมูล... --</option>';
      
      fetch(APPS_SCRIPT_URL + "?action=getDropdown")
        .then(response => response.json())
        .then(data => {
          populateDropdowns(data);
        })
        .catch(error => {
          console.error("Error:", error);
          document.getElementById('distSelect').innerHTML = '<option value="">เกิดข้อผิดพลาดในการโหลด</option>';
        });
    };

    function populateDropdowns(data) {
      areaDataMapping = data.mapping;
      let distSelect = document.getElementById('distSelect');
      
      distSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>'; // รีเซ็ตค่าเริ่มต้น
      
      data.dists.forEach(dist => {
        let opt = document.createElement('option');
        opt.value = dist;
        opt.text = dist;
        distSelect.appendChild(opt);
      });
      
      fetchData(); // สั่งให้โหลดข้อมูลทั้งหมดครั้งแรกเลย
    }

    // 2. อัปเดต AM ตาม DD ที่เลือก
    function updateAreaDropdown() {
      let distSelect = document.getElementById('distSelect').value;
      let areaSelect = document.getElementById('areaSelect');
      
      areaSelect.innerHTML = '<option value="">-- ทั้งหมด (แสดงทุก AM) --</option>';
      
      if (distSelect && areaDataMapping[distSelect]) {
        areaDataMapping[distSelect].forEach(area => {
          let opt = document.createElement('option');
          opt.value = area;
          opt.text = area;
          areaSelect.appendChild(opt);
        });
      }
    }

    // 3. ฟังก์ชันดึงข้อมูลตารางเมื่อกดปุ่มค้นหา
    function fetchData() {
      let dist = document.getElementById('distSelect').value;
      let area = document.getElementById('areaSelect').value;
      
      document.getElementById('loading').style.display = 'block';
      document.getElementById('tableBody').innerHTML = '';

      // สร้าง URL สำหรับเรียกดูข้อมูล
      let url = `${APPS_SCRIPT_URL}?action=getTableData&dist=${encodeURIComponent(dist)}&area=${encodeURIComponent(area)}`;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          renderTable(data);
        })
        .catch(error => {
          console.error("Error fetching data:", error);
          document.getElementById('loading').style.display = 'none';
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="text-center text-danger">ไม่สามารถโหลดข้อมูลได้ กรุณาลองใหม่</td></tr>';
        });
    }

    // 4. วาดตาราง
    function renderTable(data) {
      document.getElementById('loading').style.display = 'none';
      let tbody = document.getElementById('tableBody');
      
      if(data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger">ไม่พบข้อมูล</td></tr>';
        return;
      }

      let html = '';
      data.forEach(row => {
        html += '<tr>';
        html += `<td><small>${row[0] || '-'}</small></td>`;
        html += `<td><small>${row[1] || '-'}</small></td>`;
        html += `<td><b>${row[2] || '-'}</b></td>`;
        html += `<td>${row[3] || '-'}</td>`;
        html += `<td>${row[4] || '-'}</td>`;
        html += `<td>${row[5] || '-'}</td>`;
        html += `<td class="text-center">${getBadge(row[6])}</td>`;
        html += `<td class="text-center">${getBadge(row[7])}</td>`;
        html += '</tr>';
      });
      
      tbody.innerHTML = html;
    }

    // ฟังก์ชันสร้างป้ายสี
    function getBadge(status) {
      if(status === 'Red') return '<span class="badge bg-danger status-badge">สาย (Red)</span>';
      if(status === 'Yellow') return '<span class="badge bg-warning text-dark status-badge">เสี่ยง (Yellow)</span>';
      if(status === 'Green') return '<span class="badge bg-success status-badge">ตรงเวลา (Green)</span>';
      return `<span class="badge bg-secondary status-badge">${status || '-'}</span>`;
    }
  </script>
</body>
</html>
