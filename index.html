<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Store Operation Monitor</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    :root { var(--bg-color): #f0f2f5; }
    body { background-color: var(--bg-color); font-family: 'Prompt', sans-serif; }
    
    .app-header {
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      color: white; padding: 25px 0 45px 0; border-radius: 0 0 25px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative;
    }
    
    .filter-card {
      border-radius: 16px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      margin-top: -30px; position: relative; z-index: 10; background: white;
    }

    .summary-box {
      background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
      font-size: 0.9rem;
    }
    
    .store-card {
      border-radius: 16px; border: 1px solid #e2e8f0; 
      box-shadow: 0 6px 15px rgba(0,0,0,0.06); transition: all 0.2s ease; 
      margin-bottom: 20px; position: relative; cursor: pointer; background-color: #ffffff;
    }
    .store-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .store-card:active { transform: scale(0.98); }
    
    /* สลับสีพื้นหลัง สำหรับโหมดที่ไม่มีแถบสีซ้ายให้เห็นชัดเจน */
    .store-card:nth-child(odd) { background-color: #ffffff; border-left: 6px solid #2c5364; }          
    .store-card:nth-child(even) { background-color: #f4f9ff; border-left: 6px solid #6ab0e6; }   
    
    .store-title { font-size: 1.05rem; line-height: 1.3; margin-bottom: 0px; }
    .time-box { background-color: rgba(255, 255, 255, 0.6); border-radius: 12px; padding: 10px; border: 1px solid #e9ecef;}
    .time-text { font-size: 1.15rem; letter-spacing: -0.5px; margin-top: 2px; margin-bottom: 4px; }
    
    .status-badge { font-size: 0.75rem; padding: 5px 0; border-radius: 8px; width: 100%; display: block; margin-top: 5px; }

    .form-select, .btn { border-radius: 10px; font-size: 0.9rem; }
    
    .menu-btn {
      border-radius: 16px; padding: 25px 15px; background: white;
      border: 1px solid #e2e8f0; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      text-align: center; color: #2c5364; text-decoration: none; display: block;
      transition: all 0.2s ease;
    }
    .menu-btn:hover { background: #f8fafc; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
    .menu-icon { font-size: 2.5rem; margin-bottom: 10px; color: #3b82f6; }
    .back-btn { position: absolute; top: 15px; left: 15px; color: white; font-size: 1.5rem; text-decoration: none; }

    .sales-block { font-size: 0.85rem; padding-left: 12px; line-height: 1.45; border-left: 2px solid #e9ecef; margin-top: 5px; }
    .val-ty { font-weight: 600; color: #1e293b; }
    .val-diff-up { color: #16a34a; font-weight: 600;}
    .val-diff-down { color: #dc2626; font-weight: 600;}
    
    .modal-content { border-radius: 16px; border: none; }
    .modal-header { background: #f8fafc; border-radius: 16px 16px 0 0; }
    .modal-subtext { font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>

  <div class="app-header text-center">
    <a href="#" onclick="showPage('home')" class="back-btn" id="backBtn" style="display:none;"><i class="bi bi-arrow-left-circle"></i></a>
    <h4 class="fw-bold mb-1" id="headerTitle"><i class="bi bi-grid-fill"></i> เลือกระบบทำงาน</h4>
    <div id="fileDateDisplay" style="font-size: 0.85rem; opacity: 0.8; margin-top: 5px; display: none;"></div>
  </div>

  <div class="container px-3">
    
    <div id="pageHome" class="mt-4">
      <div class="row g-3">
        <div class="col-6"><a href="#" class="menu-btn" onclick="showPage('sales')"><i class="bi bi-graph-up-arrow menu-icon text-success"></i><h6 class="fw-bold mb-0">เช็คยอดขาย</h6></a></div>
        <div class="col-6"><a href="#" class="menu-btn" onclick="showPage('time')"><i class="bi bi-clock-history menu-icon text-primary"></i><h6 class="fw-bold mb-0">เช็คเปิด-ปิดร้าน</h6></a></div>
      </div>
    </div>

    <div id="pageTime" style="display: none;">
      <div class="card filter-card p-3 mb-3 mx-auto">
        <div class="row g-2 align-items-end">
          <div class="col-12"><label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">วันที่</label><select id="timeDateSelect" class="form-select"></select></div>
          <div class="col-6"><label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส DD</label><select id="timeDistSelect" class="form-select" onchange="updateTimeFilters()"></select></div>
          <div class="col-6"><label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส AM</label><select id="timeAreaSelect" class="form-select" onchange="updateTimeFilters()"><option value="">-- ทั้งหมด --</option></select></div>
          <div class="col-12 mt-2"><label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส/ชื่อสาขา</label><select id="timeStoreSelect" class="form-select"><option value="">-- สาขาทั้งหมด --</option></select></div>
          <div class="col-12 mt-3"><button class="btn btn-primary w-100 fw-bold py-2 shadow-sm" onclick="fetchTimeData()"><i class="bi bi-search"></i> ค้นหาข้อมูล</button></div>
        </div>
      </div>
      <div id="timeCardContainer" class="pb-4"></div>
    </div>

    <div id="pageSales" style="display: none;">
      <div class="card filter-card p-3 mb-4 mx-auto">
        <div class="row g-2 align-items-end">
          <div class="col-6">
            <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส RM</label>
            <select id="salesRMSelect" class="form-select" onchange="updateSalesFilters()"><option value="">-- โหลด... --</option></select>
          </div>
          <div class="col-6">
            <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส AM / DM</label>
            <select id="salesDMSelect" class="form-select" onchange="updateSalesFilters()"><option value="">-- ทั้งหมด --</option></select>
          </div>
          <div class="col-12 mt-2">
            <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;"><i class="bi bi-shop"></i> รหัส/ชื่อสาขา</label>
            <select id="salesStoreSelect" class="form-select"><option value="">-- สาขาทั้งหมด --</option></select>
          </div>
          <div class="col-12 mt-3">
            <button class="btn btn-success w-100 fw-bold py-2 shadow-sm" onclick="fetchSalesData()"><i class="bi bi-search"></i> ค้นหายอดขาย</button>
          </div>
        </div>
      </div>
      
      <div id="salesResultContainer" style="display:none;">
        <div class="summary-box" id="salesSummaryBox"></div>
        <div class="mb-3">
          <select id="salesSortSelect" class="form-select bg-white shadow-sm" onchange="applySalesSort()">
            <option value="default">จัดเรียง: ยอดขายบวกขึ้นก่อน</option>
            <option value="salesDesc">จัดเรียง: ยอดขายรวม (มาก ไป น้อย)</option>
            <option value="salesAsc">จัดเรียง: ยอดขายรวม (น้อย ไป มาก)</option>
          </select>
        </div>
        <div id="salesCardContainer" class="pb-4"></div>
      </div>
    </div>

    <div id="loading" class="text-center my-5" style="display:none;"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted fw-bold">กำลังดึงข้อมูล...</p></div>
  </div>

  <div class="modal fade" id="storeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title fw-bold text-success" id="modalStoreName">Store Name</h5>
            <div class="modal-subtext" id="modalStoreInfo">RM: - | DM: - | Type: -</div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="modalBodyContent" style="background-color: #f8fafc;"></div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNv8_4WfAFO5B3wcfxBWTNgHKhjSQid3r4jZfCVT2RKqAcVCDN_71neLwIg8opDxjB/exec";
    
    let timeDataMapping = {}, timeAllStores = [], currentTimeData = [];
    let salesDataMapping = {}, salesAllStores = [], currentSalesDataList = [], currentHeaderDate = "MTD";
    let isTimeLoaded = false, isSalesLoaded = false;
    let detailsModal;

    window.onload = function() { detailsModal = new bootstrap.Modal(document.getElementById('storeModal')); }

    function showPage(page) {
      document.getElementById('pageHome').style.display = 'none';
      document.getElementById('pageTime').style.display = 'none';
      document.getElementById('pageSales').style.display = 'none';
      document.getElementById('backBtn').style.display = page === 'home' ? 'none' : 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('fileDateDisplay').style.display = 'none';

      if (page === 'home') {
        document.getElementById('headerTitle').innerHTML = '<i class="bi bi-grid-fill"></i> เลือกระบบทำงาน';
        document.getElementById('pageHome').style.display = 'block';
      } 
      else if (page === 'time') {
        document.getElementById('headerTitle').innerHTML = '<i class="bi bi-clock-history"></i> ระบบเช็คเปิด-ปิดร้าน';
        document.getElementById('pageTime').style.display = 'block';
        if (!isTimeLoaded) loadTimeDropdowns();
      } 
      else if (page === 'sales') {
        document.getElementById('headerTitle').innerHTML = '<i class="bi bi-graph-up-arrow"></i> ระบบเช็คยอดขาย';
        document.getElementById('pageSales').style.display = 'block';
        if (!isSalesLoaded) loadSalesDropdowns();
      }
    }

    // ================= โหมด Time =================
    function loadTimeDropdowns() {
      showLoading(true);
      fetch(APPS_SCRIPT_URL + "?action=getDropdown").then(res => res.json()).then(data => {
        timeDataMapping = data.mapping; timeAllStores = data.stores;
        let dSel = document.getElementById('timeDateSelect'); dSel.innerHTML = '<option value="">-- ทุกวันที่ --</option>';
        data.dates.forEach(d => dSel.add(new Option(d.text, d.value)));
        if(data.dates.length > 0) dSel.value = data.dates[0].value;
        let distSel = document.getElementById('timeDistSelect'); distSel.innerHTML = '<option value="">-- ทั้งหมด --</option>';
        data.dists.forEach(d => distSel.add(new Option(d, d)));
        updateTimeFilters(); showLoading(false); isTimeLoaded = true;
      });
    }

    function updateTimeFilters() {
      let dist = document.getElementById('timeDistSelect').value;
      let aSel = document.getElementById('timeAreaSelect'); let curA = aSel.value;
      aSel.innerHTML = '<option value="">-- ทั้งหมด --</option>';
      if (dist && timeDataMapping[dist]) timeDataMapping[dist].forEach(a => { let o = new Option(a, a); if(a===curA) o.selected=true; aSel.add(o); });
      let sSel = document.getElementById('timeStoreSelect'); let curS = sSel.value;
      sSel.innerHTML = '<option value="">-- สาขาทั้งหมด --</option>';
      timeAllStores.filter(s => (!dist || s.dist===dist) && (!aSel.value || s.area===aSel.value)).forEach(s => {
         let o = new Option(`${s.code} ${s.name}`, s.code); if(s.code===curS) o.selected=true; sSel.add(o);
      });
    }

    // ฟังก์ชันสร้างป้ายสี แดง/เหลือง/เขียว ในกรอบเวลา
    function getTimeBadge(status) {
      if(status === 'Red') return `<span class="badge bg-danger status-badge shadow-sm"><i class="bi bi-x-circle"></i> สาย (Red)</span>`;
      if(status === 'Yellow') return `<span class="badge bg-warning text-dark status-badge shadow-sm"><i class="bi bi-exclamation-circle"></i> เสี่ยง (Yellow)</span>`;
      if(status === 'Green') return `<span class="badge bg-success status-badge shadow-sm"><i class="bi bi-check-circle"></i> ปกติ (Green)</span>`;
      return `<span class="badge bg-secondary status-badge opacity-50">-</span>`;
    }

    function fetchTimeData() {
      showLoading(true); document.getElementById('timeCardContainer').innerHTML = '';
      let url = `${APPS_SCRIPT_URL}?action=getTableData&dist=${encodeURIComponent(document.getElementById('timeDistSelect').value)}&area=${encodeURIComponent(document.getElementById('timeAreaSelect').value)}&date=${encodeURIComponent(document.getElementById('timeDateSelect').value)}&store=${encodeURIComponent(document.getElementById('timeStoreSelect').value)}`;
      fetch(url).then(res => res.json()).then(data => {
        let html = data.length ? '' : '<div class="text-center text-muted py-5"><i class="bi bi-inbox d-block fs-1"></i>ไม่พบข้อมูลในระบบ</div>';
        data.forEach(row => {
          let stIn = row[7], stOut = row[8];
          // เอาสีขอบทิ้งไป ให้ใช้สี Default (สลับคี่คู่) แล้วดึง TimeBadge เข้าไปใน Time Box แทน
          html += `
          <div class="store-card card p-3" style="cursor: default;">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="store-title fw-bold text-primary">${row[2]} ${row[3]}</h6>
              <span class="badge bg-secondary opacity-75"><i class="bi bi-calendar3"></i> ${row[4]}</span>
            </div>
            <div class="row g-2 text-center mt-1">
              <div class="col-6"><div class="time-box"><small class="text-muted d-block fw-bold" style="font-size: 0.75rem;">เวลาเข้าร้าน</small><div class="fw-bold time-text text-dark">${row[5]?row[5].substring(0,5):'-'} น.</div>${getTimeBadge(stIn)}</div></div>
              <div class="col-6"><div class="time-box"><small class="text-muted d-block fw-bold" style="font-size: 0.75rem;">เวลาออกร้าน</small><div class="fw-bold time-text text-dark">${row[6]?row[6].substring(0,5):'-'} น.</div>${getTimeBadge(stOut)}</div></div>
            </div>
          </div>`;
        });
        document.getElementById('timeCardContainer').innerHTML = html; showLoading(false);
      });
    }

    // ================= โหมด Sales =================
    function loadSalesDropdowns() {
      showLoading(true);
      fetch(APPS_SCRIPT_URL + "?action=getSalesDropdown").then(res => res.json()).then(data => {
        salesDataMapping = data.mapping; salesAllStores = data.stores;
        let rmSel = document.getElementById('salesRMSelect'); rmSel.innerHTML = '<option value="">-- ทั้งหมด --</option>';
        data.rms.forEach(r => rmSel.add(new Option(r, r)));
        updateSalesFilters(); showLoading(false); isSalesLoaded = true;
      });
    }

    function updateSalesFilters() {
      let rm = document.getElementById('salesRMSelect').value;
      let dmSel = document.getElementById('salesDMSelect'); let curDM = dmSel.value;
      dmSel.innerHTML = '<option value="">-- ทั้งหมด --</option>';
      if (rm && salesDataMapping[rm]) salesDataMapping[rm].forEach(d => { let o = new Option(d, d); if(d===curDM) o.selected=true; dmSel.add(o); });
      
      let sSel = document.getElementById('salesStoreSelect'); let curS = sSel.value;
      sSel.innerHTML = '<option value="">-- สาขาทั้งหมด --</option>';
      salesAllStores.filter(s => (!rm || s.rm===rm) && (!dmSel.value || s.dm===dmSel.value)).forEach(s => {
         let o = new Option(`${s.code} ${s.name}`, s.code); if(s.code===curS) o.selected=true; sSel.add(o);
      });
    }

    function fmtN(num) { return (num || num === 0) ? Number(num).toLocaleString('th-TH', {maximumFractionDigits: 0}) : '-'; }
    function fmtP(num) { return (num || num === 0) ? (Number(num) * 100).toFixed(2) + '%' : '-'; }
    function getColor(num) { return Number(num) >= 0 ? 'val-diff-up' : 'val-diff-down'; }

    function fetchSalesData() {
      showLoading(true); document.getElementById('salesResultContainer').style.display = 'none';
      let url = `${APPS_SCRIPT_URL}?action=getSalesData&rm=${encodeURIComponent(document.getElementById('salesRMSelect').value)}&dm=${encodeURIComponent(document.getElementById('salesDMSelect').value)}&store=${encodeURIComponent(document.getElementById('salesStoreSelect').value)}`;
      
      fetch(url).then(res => res.json()).then(data => {
        currentHeaderDate = data.headerDate; 
        currentSalesDataList = data.list;

        if (data.fileDate) {
          let dateEl = document.getElementById('fileDateDisplay');
          dateEl.innerHTML = `<i class="bi bi-info-circle"></i> ข้อมูลยอดขาย: ${data.fileDate}`;
          dateEl.style.display = 'block';
        }

        if(currentSalesDataList.length > 0) {
          document.getElementById('salesResultContainer').style.display = 'block';
          document.getElementById('salesSortSelect').value = 'default';
          applySalesSort(); 
        } else {
          document.getElementById('salesResultContainer').style.display = 'block';
          document.getElementById('salesSummaryBox').innerHTML = '';
          document.getElementById('salesCardContainer').innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-inbox d-block fs-1"></i>ไม่พบข้อมูลยอดขาย</div>';
        }
        showLoading(false);
      });
    }

    function applySalesSort() {
      let sortType = document.getElementById('salesSortSelect').value;
      let sortedData = [...currentSalesDataList];

      if (sortType === 'default') {
        sortedData.sort((a, b) => (Number(b.diffSalesBG)||0) - (Number(a.diffSalesBG)||0));
      } else if (sortType === 'salesDesc') {
        sortedData.sort((a, b) => (Number(b.salesTY)||0) - (Number(a.salesTY)||0));
      } else if (sortType === 'salesAsc') {
        sortedData.sort((a, b) => (Number(a.salesTY)||0) - (Number(b.salesTY)||0));
      }
      
      renderSalesCards(sortedData);
    }

    function renderSalesCards(data) {
      let posBG = 0, posBG_CO = 0, posBG_FC = 0; let negBG = 0, negBG_CO = 0, negBG_FC = 0;
      let posLY = 0, posLY_CO = 0, posLY_FC = 0; let negLY = 0, negLY_CO = 0, negLY_FC = 0;
      let html = '';

      data.forEach((row, index) => {
        let diffBG = Number(row.diffSalesBG) || 0;
        let diffLY = Number(row.diffSalesLY) || 0;
        let isCO = (row.cofc || "").toString().toUpperCase().includes('CO');
        let isFC = (row.cofc || "").toString().toUpperCase().includes('FC');

        if (diffBG >= 0) { posBG++; if (isCO) posBG_CO++; else if (isFC) posBG_FC++; } 
        else { negBG++; if (isCO) negBG_CO++; else if (isFC) negBG_FC++; }

        if (diffLY >= 0) { posLY++; if (isCO) posLY_CO++; else if (isFC) posLY_FC++; } 
        else { negLY++; if (isCO) negLY_CO++; else if (isFC) negLY_FC++; }

        let borderClass = diffBG >= 0 ? "border-left: 6px solid #16a34a;" : "border-left: 6px solid #dc2626;";

        html += `
        <div class="store-card card p-3 shadow-sm" style="${borderClass}" onclick="openSalesModal('${row.storeCode}')">
          <h6 class="store-title fw-bold text-dark mb-2">${row.storeCode} ${row.storeName}</h6>
          <div class="fw-bold mb-1" style="font-size: 0.8rem; color: #475569;">Sales <span class="text-primary">${currentHeaderDate}</span></div>
          
          <div class="mb-2">
            <span class="fw-bold d-block" style="font-size: 0.85rem;">Total Sales</span>
            <div class="sales-block">
              <div>TY: <span class="val-ty">${fmtN(row.salesTY)}</span></div>
              <div>BG: ${fmtN(row.salesBG)}</div>
              <div class="${getColor(row.diffSalesBG)}">Diff BG: ${fmtN(row.diffSalesBG)} (${fmtP(row.varSalesBG)})</div>
              <div>LY: ${fmtN(row.salesLY)}</div>
              <div class="${getColor(row.diffSalesLY)}">Diff LY: ${fmtN(row.diffSalesLY)} (${fmtP(row.chgSalesLY)})</div>
            </div>
          </div>

          <div>
            <span class="fw-bold d-block" style="font-size: 0.85rem;">ADS</span>
            <div class="sales-block">
              <div>TY: <span class="val-ty">${fmtN(row.adsTY)}</span></div>
              <div>BG: ${fmtN(row.adsBG)}</div>
              <div class="${getColor(row.diffAdsBG)}">Diff BG: ${fmtN(row.diffAdsBG)} (${fmtP(row.varAdsBG)})</div>
              <div>LY: ${fmtN(row.adsLY)}</div>
              <div class="${getColor(row.diffAdsLY)}">Diff LY: ${fmtN(row.diffAdsLY)} (${fmtP(row.chgAdsLY)})</div>
            </div>
          </div>
          <div class="text-end mt-2"><small class="text-primary opacity-75"><i class="bi bi-hand-index"></i> แตะเพื่อดูรายละเอียดทั้งหมด</small></div>
        </div>`;
      });

      document.getElementById('salesSummaryBox').innerHTML = `
        <div class="fw-bold text-dark mb-2 border-bottom pb-2"><i class="bi bi-bar-chart-fill text-primary"></i> สรุปผลการค้นหา (${data.length} สาขา)</div>
        <div class="row text-center mt-2">
          <div class="col-6" style="border-right: 1px solid #e2e8f0;">
             <span class="fw-bold d-block mb-1 text-primary">เทียบเป้า (BG)</span>
             <div class="text-success fw-bold" style="font-size: 0.8rem;"><i class="bi bi-arrow-up-circle-fill"></i> บวก: ${posBG} (CO:${posBG_CO}|FC:${posBG_FC})</div>
             <div class="text-danger fw-bold mt-1" style="font-size: 0.8rem;"><i class="bi bi-arrow-down-circle-fill"></i> ลบ: ${negBG} (CO:${negBG_CO}|FC:${negBG_FC})</div>
          </div>
          <div class="col-6">
             <span class="fw-bold d-block mb-1 text-primary">เทียบปีที่แล้ว (LY)</span>
             <div class="text-success fw-bold" style="font-size: 0.8rem;"><i class="bi bi-arrow-up-circle-fill"></i> บวก: ${posLY} (CO:${posLY_CO}|FC:${posLY_FC})</div>
             <div class="text-danger fw-bold mt-1" style="font-size: 0.8rem;"><i class="bi bi-arrow-down-circle-fill"></i> ลบ: ${negLY} (CO:${negLY_CO}|FC:${negLY_FC})</div>
          </div>
        </div>
      `;
      document.getElementById('salesCardContainer').innerHTML = html;
    }

    function openSalesModal(storeCode) {
      let row = currentSalesDataList.find(r => r.storeCode === storeCode);
      
      document.getElementById('modalStoreName').innerText = `${row.storeCode} ${row.storeName}`;
      document.getElementById('modalStoreInfo').innerText = `RM: ${row.rm} | DM: ${row.dm} | TYPE: ${row.cofc}`;
      
      let html = `
        <div class="card p-3 mb-2 shadow-sm border-0">
          <h6 class="fw-bold text-dark border-bottom pb-2">ลูกค้าเข้าร้าน (TC)</h6>
          <div class="row text-center mt-2">
            <div class="col-4"><small class="text-muted d-block">TY</small><b>${fmtN(row.tcTY)}</b></div>
            <div class="col-4"><small class="text-muted d-block">LY</small><b>${fmtN(row.tcLY)}</b></div>
            <div class="col-4"><small class="text-muted d-block">Diff</small><b class="${getColor(row.diffTC)}">${fmtN(row.diffTC)}</b></div>
          </div>
        </div>

        <div class="card p-3 mb-2 shadow-sm border-0">
          <h6 class="fw-bold text-dark border-bottom pb-2">ยอดซื้อต่อบิล (TV)</h6>
          <div class="row text-center mt-2">
            <div class="col-4"><small class="text-muted d-block">TY</small><b>${fmtN(row.tvTY)}</b></div>
            <div class="col-4"><small class="text-muted d-block">LY</small><b>${fmtN(row.tvLY)}</b></div>
            <div class="col-4"><small class="text-muted d-block">Diff</small><b class="${getColor(row.diffTV)}">${fmtN(row.diffTV)}</b></div>
          </div>
        </div>

        <div class="card p-3 mb-2 shadow-sm border-0">
          <h6 class="fw-bold text-dark border-bottom pb-2">กำไร (GP)</h6>
          <div class="row text-center mt-2">
            <div class="col-4"><small class="text-muted d-block">TY</small><b>${fmtP(row.gpTY)}</b></div>
            <div class="col-4"><small class="text-muted d-block">LY</small><b>${fmtP(row.gpLY)}</b></div>
            <div class="col-4"><small class="text-muted d-block">Diff</small><b class="${getColor(row.gpDiff)}">${fmtP(row.gpDiff)}</b></div>
          </div>
        </div>

        <div class="card p-3 shadow-sm border-0">
          <h6 class="fw-bold text-dark border-bottom pb-2">EXPIRE LOSS (ยอดสูญเสีย)</h6>
          <div class="row text-center mt-2">
            <div class="col-6"><small class="text-muted d-block">TY (Amt)</small><b>${fmtN(row.expAmtTY)}</b></div>
            <div class="col-6"><small class="text-muted d-block">% To Sales</small><b class="text-dark">${fmtP(row.expToSales)}</b></div>
          </div>
        </div>
      `;
      document.getElementById('modalBodyContent').innerHTML = html;
      detailsModal.show();
    }

    function showLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }
  </script>
</body>
</html>
