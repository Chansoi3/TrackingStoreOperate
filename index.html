<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Store Operation Monitor</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root { var(--bg-color): #f4f7f6; }
    body { background-color: var(--bg-color); font-family: 'Prompt', sans-serif; }
    
    .app-header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white; padding: 25px 0 45px 0; border-radius: 0 0 20px 20px;
    }
    
    .filter-card {
      border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin-top: -30px; position: relative; z-index: 10; background: white;
    }
    
    .table-card {
      border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background: white;
    }
    
    /* ปรับขนาดตารางให้กระทัดรัดสำหรับมือถือ */
    .table thead th { background-color: #f8f9fa; color: #495057; font-size: 0.85rem; padding: 12px 8px; }
    .table tbody td { padding: 12px 8px; vertical-align: middle; }
    
    .status-badge {
      font-size: 0.7rem; padding: 4px 6px; border-radius: 6px; width: 100%; display: block; margin-top: 3px;
    }
    
    .store-title { font-size: 0.95rem; line-height: 1.2; margin-bottom: 4px; }
    .store-meta { font-size: 0.75rem; color: #6c757d; }
    .time-text { font-size: 1rem; letter-spacing: -0.5px; }
    
    /* ทำให้ Dropdown เล็กกะทัดรัดลงเล็กน้อย */
    .form-select, .btn { border-radius: 8px; }
  </style>
</head>
<body>

  <div class="app-header text-center">
    <h3 class="fw-bold mb-1"><i class="bi bi-shop-window"></i> เช็คเวลาเปิด-ปิดสาขา</h3>
  </div>

  <div class="container px-2 px-md-4">
    <div class="card filter-card p-3 mb-4 mx-2 mx-md-0">
      <div class="row g-2 align-items-end">
        <div class="col-6 col-md-5">
          <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส DD</label>
          <select id="distSelect" class="form-select" onchange="updateAreaDropdown()">
            <option value="">-- โหลด... --</option>
          </select>
        </div>
        <div class="col-6 col-md-5">
          <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.8rem;">รหัส AM</label>
          <select id="areaSelect" class="form-select">
            <option value="">-- ทั้งหมด --</option>
          </select>
        </div>
        <div class="col-12 col-md-2 mt-3 mt-md-0">
          <button class="btn btn-primary w-100 fw-bold" onclick="fetchData()">
            <i class="bi bi-search"></i> ค้นหา
          </button>
        </div>
      </div>
    </div>

    <div id="loading" class="text-center my-5" style="display:none;">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted fw-bold">กำลังดึงข้อมูล...</p>
    </div>

    <div class="card table-card mb-4 mx-2 mx-md-0">
      <div class="card-body p-0">
        <table class="table table-hover mb-0" style="table-layout: fixed; width: 100%;">
          <thead>
            <tr>
              <th style="width: 50%;">ข้อมูลสาขา</th>
              <th class="text-center" style="width: 25%;">เวลาเข้า</th>
              <th class="text-center" style="width: 25%;">เวลาออก</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ นำ URL ของ Google Apps Script มาใส่ที่นี่เหมือนเดิม
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNv8_4WfAFO5B3wcfxBWTNgHKhjSQid3r4jZfCVT2RKqAcVCDN_71neLwIg8opDxjB/exec";
    let areaDataMapping = {};

    window.onload = function() {
      fetch(APPS_SCRIPT_URL + "?action=getDropdown")
        .then(res => res.json())
        .then(data => populateDropdowns(data))
        .catch(err => document.getElementById('distSelect').innerHTML = '<option value="">❌ ข้อผิดพลาด</option>');
    };

    function populateDropdowns(data) {
      areaDataMapping = data.mapping;
      let distSelect = document.getElementById('distSelect');
      distSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>'; 
      data.dists.forEach(dist => {
        distSelect.add(new Option(dist, dist));
      });
      fetchData(); 
    }

    function updateAreaDropdown() {
      let distVal = document.getElementById('distSelect').value;
      let areaSelect = document.getElementById('areaSelect');
      areaSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>';
      if (distVal && areaDataMapping[distVal]) {
        areaDataMapping[distVal].forEach(area => {
          areaSelect.add(new Option(area, area));
        });
      }
    }

    function fetchData() {
      let dist = document.getElementById('distSelect').value;
      let area = document.getElementById('areaSelect').value;
      
      document.getElementById('loading').style.display = 'block';
      document.getElementById('tableBody').innerHTML = '';
      document.querySelector('.table-card').style.display = 'none';

      let url = `${APPS_SCRIPT_URL}?action=getTableData&dist=${encodeURIComponent(dist)}&area=${encodeURIComponent(area)}`;

      fetch(url)
        .then(res => res.json())
        .then(data => renderTable(data))
        .catch(err => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" class="text-center text-danger py-4">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</td></tr>';
          document.querySelector('.table-card').style.display = 'block';
        });
    }

    function renderTable(data) {
      document.getElementById('loading').style.display = 'none';
      document.querySelector('.table-card').style.display = 'block';
      let tbody = document.getElementById('tableBody');
      
      if(data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-5"><i class="bi bi-inbox d-block fs-1"></i>ไม่มีข้อมูล</td></tr>';
        return;
      }

      let html = '';
      data.forEach(row => {
        let timeInStr = row[5] ? row[5].substring(0, 5) : '-';
        let timeOutStr = row[6] ? row[6].substring(0, 5) : '-';

        // จัดกลุ่มข้อมูลสาขาไว้ที่คอลัมน์แรกทั้งหมด
        html += `<tr>`;
        html += `<td>
                   <div class="fw-bold text-primary store-title">${row[2]} ${row[3]}</div>
                   <div class="store-meta">
                     <span class="badge bg-light text-dark border p-1 me-1">${row[0]}</span><span class="badge bg-light text-dark border p-1">${row[1]}</span>
                     <div class="mt-1"><i class="bi bi-calendar-event"></i> ${row[4]}</div>
                   </div>
                 </td>`;
                 
        // คอลัมน์ 2: เวลาเปิด
        html += `<td class="text-center px-1">
                   <div class="fw-bold time-text">${timeInStr}</div>
                   ${getBadge(row[7])}
                 </td>`;
                 
        // คอลัมน์ 3: เวลาปิด
        html += `<td class="text-center px-1">
                   <div class="fw-bold time-text">${timeOutStr}</div>
                   ${getBadge(row[8])}
                 </td>`;
        html += `</tr>`;
      });
      tbody.innerHTML = html;
    }

    function getBadge(status) {
      if(status === 'Red') return `<span class="badge bg-danger status-badge shadow-sm">สาย</span>`;
      if(status === 'Yellow') return `<span class="badge bg-warning text-dark status-badge shadow-sm">เสี่ยง</span>`;
      if(status === 'Green') return `<span class="badge bg-success status-badge shadow-sm">ปกติ</span>`;
      return `<span class="badge bg-secondary status-badge opacity-50">-</span>`;
    }
  </script>
</body>
</html>
